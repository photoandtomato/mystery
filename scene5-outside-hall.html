<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祠堂外 · 民俗解谜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#e2ddc0;
    --ink:#221f14;
    --moon:#9db0d9;
    --warn:#7a2e2e;
    --glow:#c4d0ea;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:#050608;
    font-family:'Noto Serif SC', serif;
    color:#c8ccd8;
    overflow:hidden;
    user-select:none;
  }
  .brush{ font-family:'Ma Shan Zheng', cursive; }
  .mono{ font-family:'JetBrains Mono', monospace; }

  #topbar{
    position:fixed; top:0; left:0; right:0; height:56px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 22px; z-index:50;
    background:linear-gradient(180deg, rgba(5,6,8,0.95), rgba(5,6,8,0));
  }
  #title{ font-size:22px; color:var(--glow); text-shadow:0 0 12px rgba(196,208,234,0.3); }
  #journalBtn{
    background:transparent; border:1px solid var(--moon);
    color:var(--glow); padding:8px 16px; border-radius:3px;
    font-family:'Noto Serif SC',serif; font-size:15px; cursor:pointer;
  }
  #journalBtn:hover{ background:rgba(157,176,217,0.15); }

  #room{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #scene{
    position:relative;
    width:min(900px, 96vw);
    height:min(560px, 82vh);
    background-image:url('img/hall-outside.jpg');
    background-size:cover; background-position:center;
    border-radius:4px; overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
  }
  #scene::after{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }

  .hotspot{ position:absolute; cursor:pointer; border-radius:6px; transition:box-shadow .25s, background .25s; }
  .hotspot:hover{ background:rgba(196,208,234,0.1); box-shadow:inset 0 0 0 1px rgba(196,208,234,0.5); }
  .hotspot-pulse::before{
    content:''; position:absolute; width:12px; height:12px; border-radius:50%;
    background:var(--glow); top:-6px; right:-6px;
    box-shadow:0 0 8px 3px rgba(196,208,234,0.6);
    animation:pulse 1.6s infinite; z-index:5;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.3); opacity:0.6; } }

  /* exit prompt */
  #exitPrompt{
    position:absolute; left:36%; top:6%; width:28%;
    text-align:center; font-size:14px; color:var(--glow);
    opacity:0; pointer-events:none; transition:opacity .4s;
    text-shadow:0 1px 4px rgba(0,0,0,0.9);
  }
  #exitPrompt.show{ opacity:1; pointer-events:auto; cursor:pointer; }
  #exitPrompt .icon{ font-size:22px; display:block; margin-bottom:4px; animation:pulse 1.8s infinite; }

  .overlay{
    position:fixed; inset:0; background:rgba(4,5,7,0.8);
    display:flex; align-items:center; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .card{
    background:var(--paper); color:var(--ink);
    width:min(440px,88vw); border-radius:4px; padding:28px 26px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    transform:translateY(10px) scale(0.97); transition:transform .25s;
    position:relative; max-height:82vh; overflow-y:auto;
  }
  .overlay.show .card{ transform:translateY(0) scale(1); }
  .card h2{ margin:0 0 12px; font-size:23px; color:var(--warn); }
  .card p{ font-size:16px; line-height:1.75; margin:0 0 12px; }
  .card .torn-note{
    background:#f0ead0; border-left:3px solid var(--warn);
    padding:10px 14px; font-size:15px; margin:12px 0;
    font-style:italic; color:#4a3626;
  }
  .card .closeBtn{
    position:absolute; top:14px; right:16px; background:none; border:none;
    font-size:20px; cursor:pointer; color:var(--ink); opacity:0.6;
  }
  .card .closeBtn:hover{ opacity:1; }
  .btn{
    background:var(--warn); color:#f0ead0; border:none;
    padding:10px 22px; border-radius:4px; cursor:pointer;
    font-family:'Noto Serif SC',serif; font-size:15px;
  }
  .btn:hover{ background:#963a3a; }

  #journal{
    position:fixed; top:0; right:0; bottom:0; width:min(310px,80vw);
    background:var(--paper); color:var(--ink);
    transform:translateX(100%); transition:transform .3s;
    z-index:80; padding:70px 22px 20px; overflow-y:auto;
    box-shadow:-10px 0 30px rgba(0,0,0,0.5);
  }
  #journal.show{ transform:translateX(0); }
  #journal h2{ color:var(--warn); margin-top:0; }
  #journal .entry{ border-bottom:1px solid rgba(0,0,0,0.15); padding:10px 0; font-size:14px; line-height:1.6; }
  #journal .empty{ opacity:0.5; font-style:italic; }

  .fullscreen{
    position:fixed; inset:0; background:rgba(4,5,7,0.95);
    display:flex; align-items:center; justify-content:center;
    z-index:200; text-align:center; padding:20px;
  }
  .fullscreen .box{ max-width:500px; }
  .fullscreen h1{ font-size:32px; color:var(--glow); margin-bottom:16px; }
  .fullscreen p{ font-size:17px; line-height:1.8; color:#b0b6c4; margin-bottom:22px; }
  .hidden{ display:none; }
</style>
</head>
<body>

<div id="topbar">
  <div id="title" class="brush">祠堂外</div>
  <button id="journalBtn">📓 线索</button>
</div>

<div id="room">
  <div id="scene">
    <!-- 人影脚边掉落的纸片 -->
    <div id="scrap" class="hotspot hotspot-pulse" style="left:58%; top:82%; width:16%; height:14%;"></div>

    <div id="exitPrompt"><span class="icon">🚪</span>推门进祠堂</div>
  </div>
</div>

<!-- clue modal -->
<div class="overlay" id="clueOverlay">
  <div class="card">
    <button class="closeBtn" onclick="closeOverlay('clueOverlay')">✕</button>
    <h2 id="clueTitle"></h2>
    <div id="clueBody"></div>
  </div>
</div>

<!-- intro -->
<div class="fullscreen" id="introScreen">
  <div class="box">
    <h1 class="brush">祠堂外</h1>
    <p>从密室出来时天已经黑透了。你路过祠堂,却看见那扇常年落锁的门虚掩着一条缝——月光下,一个人影正站在门口,一动不动。</p>
    <button class="btn" onclick="startGame()">屏住呼吸,躲在暗处</button>
  </div>
</div>

<!-- ending -->
<div class="fullscreen hidden" id="endingScreen">
  <div class="box">
    <h1 class="brush">推门而入</h1>
    <p id="endingText"></p>
    <button class="btn" onclick="location.href='scene1-ancestral-hall.html'">走进祠堂 →</button>
  </div>
</div>

<!-- journal -->
<div id="journal">
  <h2 class="brush">线索</h2>
  <div id="journalList"><div class="empty">尚未发现任何线索……</div></div>
</div>

<script>
  const state = { started:false, foundScrap:false };

  function startGame(){
    document.getElementById('introScreen').classList.add('hidden');
    state.started = true;
  }

  function openOverlay(id){ document.getElementById(id).classList.add('show'); }
  function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }

  function addJournalEntry(text){
    const list = document.getElementById('journalList');
    if(list.querySelector('.empty')) list.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'entry';
    div.textContent = text;
    list.appendChild(div);
  }

  document.getElementById('scrap').addEventListener('click', ()=>{
    if(!state.started) return;
    if(!state.foundScrap){
      state.foundScrap = true;
      document.getElementById('scrap').classList.remove('hotspot-pulse');
      addJournalEntry('纸片:那人脚边掉落了一角纸片,边缘的裁痕很新,像是刚从一本旧书上撕下来的。');
      document.getElementById('exitPrompt').classList.add('show');
    }
    document.getElementById('clueTitle').textContent = '掉落的纸片';
    document.getElementById('clueBody').innerHTML = `
      <p>你蹲下身,捡起那张被踩得有些皱的纸片。边缘是撕扯留下的毛边,不是自然脱落的旧纸——像是刚刚才从哪本书上硬生生撕下来的。</p>
      <div class="torn-note">纸片上只剩半行字:「……借这躯壳,换我女儿一眼阳光……」</div>
      <p>这不是你熟悉的任何一房的口气。这个人是谁?她说的又是谁家的女儿?</p>
    `;
    openOverlay('clueOverlay');
  });

  document.getElementById('exitPrompt').addEventListener('click', ()=>{
    if(!state.started) return;
    document.getElementById('endingText').textContent =
      '那个身影不知什么时候已经消失在巷子尽头。你捏着那张纸片,深吸一口气,推开了那扇虚掩的门。';
    document.getElementById('endingScreen').classList.remove('hidden');
  });

  document.getElementById('journalBtn').addEventListener('click', ()=>{
    document.getElementById('journal').classList.toggle('show');
  });
</script>

</body>
</html>
