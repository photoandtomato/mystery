<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祠堂 · 民俗解谜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#cbb98c;
    --ink:#241a12;
    --red-bright:#8f2e2e;
    --gold-bright:#d0a94f;
    --glow:#e8a33d;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:#070504;
    font-family:'Noto Serif SC', serif;
    color:var(--paper);
    overflow:hidden;
    user-select:none;
  }
  .brush{ font-family:'Ma Shan Zheng', cursive; }
  .mono{ font-family:'JetBrains Mono', monospace; }

  #topbar{
    position:fixed; top:0; left:0; right:0; height:56px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 22px; z-index:50;
    background:linear-gradient(180deg, rgba(7,5,4,0.95), rgba(7,5,4,0));
  }
  #title{ font-size:24px; color:var(--gold-bright); text-shadow:0 0 14px rgba(232,163,61,0.3); }
  #journalBtn{
    background:transparent; border:1px solid var(--gold-bright);
    color:var(--gold-bright); padding:8px 16px; border-radius:3px;
    font-family:'Noto Serif SC',serif; font-size:15px; cursor:pointer;
  }
  #journalBtn:hover{ background:rgba(232,163,61,0.15); }

  #room{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #scene{
    position:relative;
    width:min(820px, 96vw);
    height:min(620px, 84vh);
    background-image:url('img/hall-altar.jpg');
    background-size:cover; background-position:center;
    border-radius:4px; overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
  }
  #scene::after{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
  }

  .hotspot{ position:absolute; cursor:pointer; border-radius:6px; transition:box-shadow .25s, background .25s; }
  .hotspot:hover{ background:rgba(232,163,61,0.08); box-shadow:inset 0 0 0 1px rgba(232,163,61,0.4); }
  .hotspot-pulse::before{
    content:''; position:absolute; width:14px; height:14px; border-radius:50%;
    background:var(--glow); top:-6px; right:-6px;
    box-shadow:0 0 10px 4px rgba(232,163,61,0.6);
    animation:pulse 1.6s infinite; z-index:5;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.3); opacity:0.6; } }

  .book-label{
    position:absolute; bottom:-2px; left:0; right:0; text-align:center;
    font-size:11px; background:rgba(20,14,10,0.7); color:var(--gold-bright);
    padding:2px 0; border-radius:0 0 4px 4px;
  }

  /* exit prompt */
  #exitPrompt{
    position:absolute; right:4%; top:6%; width:26%;
    text-align:center; font-size:13px; color:var(--gold-bright);
    opacity:0; pointer-events:none; transition:opacity .4s;
    text-shadow:0 1px 4px rgba(0,0,0,0.8);
  }
  #exitPrompt.show{ opacity:1; pointer-events:auto; cursor:pointer; }
  #exitPrompt .icon{ font-size:22px; display:block; margin-bottom:4px; animation:pulse 1.8s infinite; }

  /* modal */
  .overlay{
    position:fixed; inset:0; background:rgba(6,4,3,0.78);
    display:flex; align-items:center; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .card{
    background:var(--paper); color:var(--ink);
    width:min(440px,88vw); border-radius:4px; padding:28px 26px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    transform:translateY(10px) scale(0.97); transition:transform .25s;
    position:relative;
    max-height:80vh; overflow-y:auto;
  }
  .overlay.show .card{ transform:translateY(0) scale(1); }
  .card h2{ margin:0 0 12px; font-size:23px; color:var(--red-bright); }
  .card p{ font-size:16px; line-height:1.7; margin:0 0 12px; }
  .card .torn-note{
    background:#e8dcc0; border-left:3px solid var(--red-bright);
    padding:10px 14px; font-size:15px; margin:12px 0;
    font-style:italic; color:#4a3626;
  }
  .card .closeBtn{
    position:absolute; top:14px; right:16px; background:none; border:none;
    font-size:20px; cursor:pointer; color:var(--ink); opacity:0.6;
  }
  .card .closeBtn:hover{ opacity:1; }
  .btn{
    background:var(--red-bright); color:var(--paper); border:none;
    padding:10px 22px; border-radius:4px; cursor:pointer;
    font-family:'Noto Serif SC',serif; font-size:15px; transition:background .2s;
  }
  .btn:hover{ background:#a84040; }

  /* journal panel */
  #journal{
    position:fixed; top:0; right:0; bottom:0; width:min(310px,80vw);
    background:var(--paper); color:var(--ink);
    transform:translateX(100%); transition:transform .3s;
    z-index:80; padding:70px 22px 20px; overflow-y:auto;
    box-shadow:-10px 0 30px rgba(0,0,0,0.5);
  }
  #journal.show{ transform:translateX(0); }
  #journal h2{ color:var(--red-bright); margin-top:0; }
  #journal .entry{
    border-bottom:1px solid rgba(0,0,0,0.15); padding:10px 0; font-size:14px; line-height:1.6;
  }
  #journal .empty{ opacity:0.5; font-style:italic; }

  /* fullscreen intro/ending */
  .fullscreen{
    position:fixed; inset:0; background:rgba(6,4,3,0.95);
    display:flex; align-items:center; justify-content:center;
    z-index:200; text-align:center; padding:20px;
  }
  .fullscreen .box{ max-width:500px; }
  .fullscreen h1{ font-size:34px; color:var(--gold-bright); margin-bottom:16px; }
  .fullscreen p{ font-size:17px; line-height:1.8; color:#d4c69a; margin-bottom:22px; }
  .hidden{ display:none; }
</style>
</head>
<body>

<div id="topbar">
  <div id="title" class="brush">祠堂</div>
  <button id="journalBtn">📓 线索</button>
</div>

<div id="room">
  <div id="scene">
    <!-- 牌位墙+佛像 -->
    <div id="tabletWall" class="hotspot hotspot-pulse" style="left:0%; top:12%; width:100%; height:42%;"></div>

    <!-- 供台抽屉(藏在红布桌裙下面) -->
    <div id="drawer" class="hotspot hotspot-pulse" style="left:18%; top:80%; width:64%; height:16%;"></div>

    <!-- 抽屉打开后出现的两本书 -->
    <div id="genealogyBook" class="hotspot" style="display:none; left:30%; top:66%; width:16%; height:12%;">
      <div class="book-label">族谱</div>
    </div>
    <div id="spellBook" class="hotspot" style="display:none; left:54%; top:66%; width:16%; height:12%;">
      <div class="book-label">归魂录</div>
    </div>

    <div id="exitPrompt"><span class="icon">🕯</span>离开祠堂</div>
  </div>
</div>

<!-- clue modal -->
<div class="overlay" id="clueOverlay">
  <div class="card">
    <button class="closeBtn" onclick="closeOverlay('clueOverlay')">✕</button>
    <h2 id="clueTitle"></h2>
    <div id="clueBody"></div>
  </div>
</div>

<!-- intro -->
<div class="fullscreen" id="introScreen">
  <div class="box">
    <h1 class="brush">祠堂</h1>
    <p>那个身影已经先你一步溜进了祠堂,又很快仓皇地钻了出去,消失在夜色里。你等心跳平复了些,才壮着胆子推开了这扇常年落锁的门——这里供着李氏历代先祖,也供着一些不该被问起的秘密。</p>
    <button class="btn" onclick="startGame()">推门进去</button>
  </div>
</div>

<!-- ending -->
<div class="fullscreen hidden" id="endingScreen">
  <div class="box">
    <h1 class="brush">未完待续</h1>
    <p id="endingText"></p>
    <button class="btn" onclick="location.reload()">重新查看这个场景</button>
  </div>
</div>

<!-- journal -->
<div id="journal">
  <h2 class="brush">线索</h2>
  <div id="journalList"><div class="empty">尚未发现任何线索……</div></div>
</div>

<script>
  const state = {
    started:false,
    found:{ genealogy:false, spell:false, tablet:false, drawer:false },
  };

  function startGame(){
    document.getElementById('introScreen').classList.add('hidden');
    state.started = true;
  }

  function openOverlay(id){ document.getElementById(id).classList.add('show'); }
  function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }

  function addJournalEntry(text){
    const list = document.getElementById('journalList');
    if(list.querySelector('.empty')) list.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'entry';
    div.textContent = text;
    list.appendChild(div);
  }

  function checkAllFound(){
    const done = state.found.genealogy && state.found.spell && state.found.tablet;
    if(done) document.getElementById('exitPrompt').classList.add('show');
  }

  // ---- 牌位墙 ----
  document.getElementById('tabletWall').addEventListener('click', ()=>{
    if(!state.started) return;
    if(!state.found.tablet){
      state.found.tablet = true;
      document.getElementById('tabletWall').classList.remove('hotspot-pulse');
      addJournalEntry('牌位墙:角落里有一块没有刻字的素色牌位,和其他先祖牌位明显不同。');
    }
    document.getElementById('clueTitle').textContent = '牌位墙';
    document.getElementById('clueBody').innerHTML = `
      <p>历代先祖的牌位整整齐齐排着,唯独角落里有一块素面牌位,没有名字,只在背面模糊刻着一个年份。</p>
      <div class="torn-note">背面刻痕:「一九七七」</div>
      <p>你想不起族里有谁是这一年出生的——至少,长辈们从没提过。</p>
    `;
    openOverlay('clueOverlay');
    checkAllFound();
  });

  // ---- 供台抽屉 ----
  document.getElementById('drawer').addEventListener('click', ()=>{
    if(!state.started) return;
    if(!state.found.drawer){
      state.found.drawer = true;
      document.getElementById('drawer').classList.remove('hotspot-pulse');
      document.getElementById('genealogyBook').style.display = 'block';
      document.getElementById('spellBook').style.display = 'block';
      document.getElementById('genealogyBook').classList.add('hotspot-pulse');
      document.getElementById('spellBook').classList.add('hotspot-pulse');
      addJournalEntry('供台抽屉:红布桌裙下面藏着一个抽屉,里面放着两本书——一本族谱,一本封皮陌生的《归魂录》。');
    }
    document.getElementById('clueTitle').textContent = '供台抽屉';
    document.getElementById('clueBody').innerHTML = `
      <p>你蹲下身,撩开垂到地上的红布桌裙——供台下面竟然还藏着一个不起眼的抽屉。拉开一看,里面并排放着两本书。</p>
      <p>一本是家里常见的族谱,另一本你从没见过,封皮上只写着三个字:《归魂录》。</p>
    `;
    openOverlay('clueOverlay');
  });

  // ---- 族谱 ----
  document.getElementById('genealogyBook').addEventListener('click', ()=>{
    if(!state.started || !state.found.drawer) return;
    if(!state.found.genealogy){
      state.found.genealogy = true;
      document.getElementById('genealogyBook').classList.remove('hotspot-pulse');
      addJournalEntry('族谱:春夏秋冬这一辈的记录里,有一条名字被涂去的条目,标注「长房之长」,时间比三兄弟都早。');
    }
    document.getElementById('clueTitle').textContent = '族谱';
    document.getElementById('clueBody').innerHTML = `
      <p>你翻到父亲这一辈的记录。李夏、李秋、李冬三人的生辰、字号都记得清清楚楚,可最上面还有一行——</p>
      <div class="torn-note">「长房之长,一九七七年生,墨迹涂改,姓名不可辨」</div>
      <p>按顺序,这应该是排在三兄弟之前、家里最年长的一位。可你从没听任何人提起过,自己还有这样一位素未谋面的长辈。</p>
    `;
    openOverlay('clueOverlay');
    checkAllFound();
  });

  // ---- 归魂录 ----
  document.getElementById('spellBook').addEventListener('click', ()=>{
    if(!state.started || !state.found.drawer) return;
    if(!state.found.spell){
      state.found.spell = true;
      document.getElementById('spellBook').classList.remove('hotspot-pulse');
      addJournalEntry('《归魂录》:第四十三页被人整齐撕去,残留的字迹提到「以魂换魂」的禁忌之法——想到刚才在门外看见的那个身影,你几乎能确定是谁干的了。');
    }
    document.getElementById('clueTitle').textContent = '《归魂录》';
    document.getElementById('clueBody').innerHTML = `
      <p>书页泛黄发脆,你小心地翻着,翻到第四十三页时——那一页齐整整地被撕掉了,只留下一道整齐的裁痕,不像是自然破损,倒像是刚刚才发生的事。</p>
      <div class="torn-note">残页可辨的半句:「……以魂换魂,需活人躯壳,尚可回魂……」</div>
      <p>你想起方才那个仓皇钻出祠堂的身影——是她撕走了这一页吗?又是为了让谁"回魂"?</p>
    `;
    openOverlay('clueOverlay');
    checkAllFound();
  });

  // ---- 离开祠堂 ----
  document.getElementById('exitPrompt').addEventListener('click', ()=>{
    if(!state.started) return;
    document.getElementById('endingText').textContent =
      '你把书放回原处,吹熄烛火。牌位上的年份、族谱里被涂去的名字、被撕走的那一页——碎片正在拼成一个你越来越不敢细想的轮廓。你攥紧手心,转身朝堂姐的房间跑去。';
    document.getElementById('endingScreen').classList.remove('hidden');
  });

  document.getElementById('journalBtn').addEventListener('click', ()=>{
  
    document.getElementById('journal').classList.toggle('show');
  });
</script>

</body>
</html>
